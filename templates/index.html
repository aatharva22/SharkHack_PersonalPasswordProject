<head>
    <meta charset="UTF-8">
    <title>Personal Password Generator</title>
    <!-- Danielle Williams 4/4/2026 -->
    <link rel="stylesheet" href="https://use.typekit.net/lyg1asp.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
    function validateForm() {
    const word1 = document.getElementById("word1").value.trim();
    const word2 = document.getElementById("word2").value.trim();
    const word3 = document.getElementById("word3").value.trim();
    const errorMessage = document.getElementById("error-message");

    if (word1 === "" || word2 === "") {
        errorMessage.textContent = "Please fill in all required fields.";
        return false;
    }

    errorMessage.textContent = "";
    return true;
    }
</script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><mark>Personal Password</mark></h1>
            <h3 class="slogan">Easy to remember. Hard to guess. Personal to you.</h3>
        </div>
        <div class="form">
            <form method="post" onsubmit="return validateForm()"> 
                <input type="hidden" name="action" value="generate">
            <div class="enterWords">
                <h2>Please enter up to 5 words</h2>
                <div class="wordFields">
                    <div>
                        <input type="text" id="word1" name="word1"><br>
                        <label for="word1">Word 1*</label><br><br>

                        <input type="text" id="word2" name="word2"><br>
                        <label for="word2">Word 2*</label><br>
                    </div>
                    <div>
                        <input type="text" id="word3" name="word3"><br>
                        <label for="word3">Word 3</label><br><br>

                        <input type="text" id="word4" name="word4"><br>
                        <label for="word4">Word 4</label><br>
                    </div>
                    <div>
                        <input type="text" id="word5" name="word5"><br>
                        <label for="word5">Word 5</label><br><br>
                    </div>
                    <p id="error-message" style="color: red;"></p>
                    <button type="submit" >Generate Password</button>
                </div>
            </div>
            <div class="options">
                <h2>Options</h2>
                <div class="options">
                    <label for="sep" >Separator</label>
                    <input type="text" id="sep" name="sep" style="width: 30px"><br><br>

                    <div class="check">
                        <input type="checkbox" id="replace" name="replace" >
                        <label for="replace">Convert letters to common replacements</label>
                    </div>
                </div>
            </div>
            <br>
            
            </form>
        </div>
        {% if password or checker %}
            <div class="result">
                <div class="securityLevel">
                    <h2 class="teal">Security Level</h2>
                    <p class="teal">{{checker}}</p>
                </div>
                <div class="yourPassword">
                    <h2 class="teal">Your Password</h2>
                    <form method="post" class="editGenerated">
                        <input type="hidden" name="action" value="check">
                        <input type="text" id="pass" name="pass" value="{{password}}"><br><br>
                        <button type="submit" id="checkStrength" name="checkStrength" >Check Strength</button>
                    </form>
                </div>
            </div>
        {% endif %}

    </div>
</body>
